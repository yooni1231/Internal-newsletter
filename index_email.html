<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Zivid Korea FAE Newsletter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
  <style type="text/css">
    body { margin:0 !important; padding:0 !important; background-color:#0D0D0D !important; }
    img  { border:0; display:block; }
    a    { text-decoration:none; }
    @media only screen and (max-width:600px) {
      .email-wrapper  { width:100% !important; }
      .mobile-pad     { padding-left:20px !important; padding-right:20px !important; }
      .hero-h1        { font-size:32px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0D0D0D;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0D0D0D;">
<tr><td align="center">
<table class="email-wrapper" width="640" cellpadding="0" cellspacing="0" border="0"
       style="max-width:640px;width:640px;background-color:#0D0D0D;">

  <!-- ══════════════════════════════════
       HEADER
  ══════════════════════════════════ -->
  <tr>
    <td class="mobile-pad"
        style="background-color:#111111;border-bottom:1px solid #2A2A2A;padding:0 40px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td valign="middle" style="padding:19px 0;">
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td valign="middle" style="padding-right:14px;">
                  <img src="cid:zivid_logo" alt="Zivid" height="26"
                       style="height:26px;width:auto;display:block;">
                </td>
                <td valign="middle">
                  <span style="font-family:'DM Serif Display',Georgia,serif;
                               font-size:18px;color:#F5F5F0;">ZIVID KOREA NEWSLETTER</span>
                </td>
              </tr>
            </table>
          </td>
          <td align="right" valign="middle" style="padding:19px 0;">
            <span style="font-family:'DM Mono','Courier New',monospace;
                         font-size:11px;color:#A0A0A0;">총 [TOTAL_COUNT]건</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>



  <!-- ══════════════════════════════════
       TOP NEWS
  ══════════════════════════════════ -->
  <tr>
    <td class="mobile-pad"
        style="padding:50px 40px;border-bottom:1px solid #2A2A2A;">
      <p style="margin:0 0 20px;
                font-family:'DM Serif Display',Georgia,serif;
                font-size:22px;color:#F5F5F0;">🔥 Top News</p>
      [TOP_NEWS]
    </td>
  </tr>

  <!-- ══════════════════════════════════
       CATEGORY BLOCKS
  ══════════════════════════════════ -->
  <tr>
    <td class="mobile-pad" style="padding:50px 40px 80px;">
      [CATEGORY_BLOCKS]
    </td>
  </tr>

  <!-- ══════════════════════════════════
       FOOTER
  ══════════════════════════════════ -->
  <tr>
    <td class="mobile-pad"
        style="border-top:1px solid #2A2A2A;padding:25px 40px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Arial,sans-serif;
                     font-size:11px;color:#A0A0A0;">
            ZIVID Korea Team
          </td>
          <td align="right"
              style="font-family:'DM Mono','Courier New',monospace;
                     font-size:11px;color:#A0A0A0;">
            Generated [GENERATED_AT]
          </td>
        </tr>
      </table>
    </td>
  </tr>

</table>
</td></tr>
</table>

</body>
</html>
